<title>Motory Shop - Dashboard Access</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0D1B2A;display:flex;justify-content:center;align-items:center;min-height:100vh}
.login-card{background:#1B2A4A;border-radius:16px;padding:48px 40px;width:420px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.4)}
.logo{color:#00B4D8;font-size:32px;letter-spacing:4px;font-weight:800;margin-bottom:8px}
.tagline{color:#94A3B8;font-size:14px;margin-bottom:32px}
.lock-icon{width:60px;height:60px;background:rgba(0,180,216,0.15);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px}
.lock-icon svg{width:28px;height:28px;fill:#00B4D8}
.field-label{color:#94A3B8;font-size:12px;letter-spacing:2px;font-weight:700;text-align:left;margin-bottom:8px}
.pw-wrap{position:relative;margin-bottom:24px}
.pw-wrap input{width:100%;padding:14px 60px 14px 16px;background:#0D1B2A;border:1px solid #2A3F5F;border-radius:8px;color:#fff;font-size:15px;outline:none;transition:border 0.3s}
.pw-wrap input:focus{border-color:#00B4D8}
.pw-wrap input::placeholder{color:#4A5568}
.toggle-pw{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#64748B;cursor:pointer;font-size:13px;font-weight:600}
.toggle-pw:hover{color:#00B4D8}
.submit-btn{width:100%;padding:14px;background:linear-gradient(135deg,#0066CC,#00B4D8);color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:700;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;letter-spacing:1px}
.submit-btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,102,204,0.4)}
.error-msg{color:#DC3545;font-size:13px;margin-top:12px;display:none}
.footer-note{color:#4A5568;font-size:11px;margin-top:24px}
</style>
</head>

async function decrypt(){
  try{
    const pw=document.getElementById('pwInput').value;
    const ep=JSON.parse(EP);
    const salt=Uint8Array.from(atob(ep.salt),c=>c.charCodeAt(0));
    const iv=Uint8Array.from(atob(ep.iv),c=>c.charCodeAt(0));
    const tag=Uint8Array.from(atob(ep.tag),c=>c.charCodeAt(0));
    const data=Uint8Array.from(atob(ep.data),c=>c.charCodeAt(0));
    const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:100000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
    const combined=new Uint8Array([...data,...tag]);
    const dec=await crypto.subtle.decrypt({name:'AES-GCM',iv,tagLength:128},key,combined);
    const html=new TextDecoder().decode(dec);
    document.open();document.write(html);document.close();
  }catch(e){
    document.getElementById('errMsg').style.display='block';
  }
}
document.getElementById('pwInput').addEventListener('keydown',e=>{if(e.key==='Enter')decrypt()});
</script>
