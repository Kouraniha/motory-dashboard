<title>Motory Shop - Dashboard Access</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #0D1B2A; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .login-container { background: #1B2A4A; border-radius: 16px; padding: 48px 40px; width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); text-align: center; }
  .logo { color: #00B4D8; font-size: 32px; font-weight: 800; letter-spacing: 4px; margin-bottom: 8px; }
  .tagline { color: #94A3B8; font-size: 13px; margin-bottom: 36px; }
  .lock-icon { width: 64px; height: 64px; margin: 0 auto 24px; background: rgba(0,180,216,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .lock-icon svg { width: 28px; height: 28px; fill: #00B4D8; }
  .field-label { text-align: left; color: #94A3B8; font-size: 12px; font-weight: 600; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
  .input-wrap { position: relative; margin-bottom: 24px; }
  input[type="password"] { width: 100%; padding: 14px 48px 14px 16px; background: #0D1B2A; border: 2px solid #2A3F5F; border-radius: 8px; color: #F0F4F8; font-size: 16px; outline: none; transition: border-color 0.2s; }
  input[type="password"]:focus { border-color: #00B4D8; }
  input[type="password"]::placeholder { color: #4A5568; }
  .toggle-pass { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #64748B; font-size: 13px; }
  .toggle-pass:hover { color: #00B4D8; }
  .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #0066CC, #00B4D8); border: none; border-radius: 8px; color: white; font-size: 16px; font-weight: 700; cursor: pointer; transition: transform 0.1s, box-shadow 0.2s; letter-spacing: 0.5px; }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,102,204,0.4); }
  .btn:active { transform: translateY(0); }
  .error { color: #DC3545; font-size: 13px; margin-top: 12px; display: none; }
  .footer-text { color: #4A5568; font-size: 11px; margin-top: 24px; }
  .spinner { display: none; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.2); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>

function togglePass() {
  const p = document.getElementById('pwd');
  const b = document.querySelector('.toggle-pass');
  if (p.type === 'password') { p.type = 'text'; b.textContent = 'Hide'; }
  else { p.type = 'password'; b.textContent = 'Show'; }
}

document.getElementById('pwd').addEventListener('keydown', e => { if (e.key === 'Enter') unlock(); });

async function unlock() {
  const pwd = document.getElementById('pwd').value;
  if (!pwd) return;
  
  const btn = document.getElementById('unlockBtn');
  const spinner = document.getElementById('spinner');
  const err = document.getElementById('err');
  
  btn.style.display = 'none';
  spinner.style.display = 'block';
  err.style.display = 'none';

  try {
    const salt = Uint8Array.from(atob(EP.salt), c => c.charCodeAt(0));
    const iv = Uint8Array.from(atob(EP.iv), c => c.charCodeAt(0));
    const tag = Uint8Array.from(atob(EP.tag), c => c.charCodeAt(0));
    const data = Uint8Array.from(atob(EP.data), c => c.charCodeAt(0));

    // Combine ciphertext + tag for GCM
    const combined = new Uint8Array(data.length + tag.length);
    combined.set(data);
    combined.set(tag, data.length);

    // Derive key with PBKDF2
    const keyMaterial = await crypto.subtle.importKey('raw', new TextEncoder().encode(pwd), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
      keyMaterial,
      { name: 'AES-GCM', length: 256 },
      false,
      ['decrypt']
    );

    const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, combined);
    const html = new TextDecoder().decode(decrypted);

    // Replace entire page with decrypted dashboard
    document.open();
    document.write(html);
    document.close();
  } catch (e) {
    btn.style.display = 'block';
    spinner.style.display = 'none';
    err.style.display = 'block';
    document.getElementById('pwd').value = '';
    document.getElementById('pwd').focus();
  }
}
</script>
</body>
